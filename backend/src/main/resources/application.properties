spring.application.name=routineremind-api
server.port=${PORT:8080}

# GCP / Firebase
routineremind.gcp.project-id=${ROUTINEREMIND_GCP_PROJECT_ID:routineremind}
routineremind.gcp.storage-bucket=${ROUTINEREMIND_GCP_STORAGE_BUCKET:routineremind-media}
# Path to the service-account key (relative to the backend working dir).
# Falls back to GOOGLE_APPLICATION_CREDENTIALS if this file is not found.
routineremind.gcp.service-account-path=${ROUTINEREMIND_GCP_SERVICE_ACCOUNT_PATH:../secrets/routineremind-f3d2edfe549c.json}

# CORS origins for the web clients (dev)
routineremind.cors.allowed-origins=${ROUTINEREMIND_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:5173}

# Optional shared secret for Cloud Scheduler reminder jobs.
# In Cloud Run set ROUTINEREMIND_REMINDERS_SCHEDULER_TOKEN.
routineremind.reminders.scheduler-token=${ROUTINEREMIND_REMINDERS_SCHEDULER_TOKEN:}
