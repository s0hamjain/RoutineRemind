substitutions:
  _IMAGE: us-central1-docker.pkg.dev/routineremind/routineremind/web-admin:latest
  _API_BASE_URL: /api/v1

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg
      - API_BASE_URL=${_API_BASE_URL}
      - -t
      - ${_IMAGE}
      - .
  - name: gcr.io/cloud-builders/docker
    args: [push, ${_IMAGE}]

images:
  - ${_IMAGE}
